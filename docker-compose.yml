version: "3.9"

services:
  # ── Base de données PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wakagenda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wakagenda_user
      POSTGRES_PASSWORD: wakagenda_pass
      POSTGRES_DB: wakagenda_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wakagenda_user -d wakagenda_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wakagenda_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://wakagenda_user:wakagenda_pass@postgres:5432/wakagenda_db
      SECRET_KEY: ${SECRET_KEY:-changez-moi-en-production-32-chars-min}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      DEBUG: "False"
      ALLOWED_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
